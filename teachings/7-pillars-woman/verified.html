<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prayer Verified — StayTheWay Ministry</title>
<style>
  :root { --navy: #000014; --blue: #1478F0; --sky: #28A0F0; --rose: #F4B6C9; --white: #FFFFFF; --chrome: #DCDCDC; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--navy); color: var(--chrome);
    font-family: Georgia, serif; line-height: 1.6; }
  .wrap { max-width: 620px; margin: 0 auto; padding: 2rem 1rem 3rem; text-align: center; }
  h1 { color: var(--white); font-size: clamp(1.5rem, 5vw, 2rem);
    border-bottom: 3px solid var(--blue); padding-bottom: 0.75rem; position: relative; }
  h1::after { content: ""; position: absolute; left: 0; right: 0; bottom: -7px; height: 3px; background: var(--rose); }
  .verse { margin: 1.5rem 0; padding: 1.1rem; background: #06112B; border: 1px solid var(--blue);
    border-left: 6px solid var(--rose); font-style: italic; color: var(--white); font-size: 1.05rem; }
  .verse .ref { display: block; margin-top: 0.5rem; color: var(--rose);
    font-weight: 900; font-style: normal; font-size: 0.85rem; letter-spacing: 0.1em; }
  p { font-size: 1rem; }
  a { color: var(--sky); text-decoration: none; font-weight: 700; }
  .btn { display: inline-block; margin-top: 1.5rem; background: var(--blue); color: var(--white);
    padding: 0.85rem 2rem; font-weight: 900; letter-spacing: 0.1em; border-radius: 4px;
    text-decoration: none; font-size: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Thank You — Your Prayer Is With Us</h1>
  <div class="verse">
    &ldquo;Cast all your care upon Him, for He cares for you.&rdquo;
    <span class="ref">— 1 Peter 5:7 (NKJV)</span>
  </div>
  <p>Your prayer request has been <strong style="color:var(--white);">verified</strong> and sent to our prayer team. We'll carry it before the Father.</p>
  <a href="https://staytheway.com" class="btn">BACK TO STAYTHEWAY.COM</a>
</div>
</body>
</html>
