<style>
  :root {
    --navy: #000014; --navy-2: #06112B; --blue: #1478F0; --sky: #28A0F0;
    --chrome: #DCDCDC; --rose: #F4B6C9; --white: #FFFFFF;
    --yellow: #FFD93D; --green: #3AC47B; --purple: #B07CD8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--navy); color: var(--chrome);
    font-family: "Helvetica Neue", Arial, sans-serif; }
  .wrap { max-width: 580px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  header { text-align: center; padding-bottom: 1rem; border-bottom: 3px solid var(--yellow); position: relative; }
  header::after { content: ""; position: absolute; left: 0; right: 0; bottom: -7px; height: 3px; background: var(--rose); }
  header .kicker { color: var(--yellow); letter-spacing: 0.3em; font-weight: 900; font-size: 0.75rem; }
  header h1 { font-family: Georgia, serif; color: var(--white); margin: 0.3rem 0; font-size: clamp(1.5rem, 6vw, 2rem); }
  header .emoji { font-size: 2rem; margin-top: 0.3rem; }

  .section { background: var(--navy-2); border: 2px solid var(--blue); border-radius: 12px;
    padding: 1.2rem; margin: 1.25rem 0; }
  .section h2 { color: var(--yellow); font-size: 1.1rem; margin: 0 0 0.75rem; text-align: center; }
  .section p { font-size: 0.95rem; line-height: 1.5; margin: 0.5rem 0; text-align: center; }

  /* Color the Pillars */
  .pillars { display: flex; justify-content: center; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
  .pillar {
    width: 55px; height: 100px; border: 3px solid var(--chrome); border-radius: 6px 6px 0 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 0.65rem; font-weight: 700;
    text-align: center; padding: 0.2rem; line-height: 1.2; color: var(--white);
    background: var(--navy);
  }
  .pillar .p-icon { font-size: 1.3rem; margin-bottom: 0.15rem; }
  .pillar:active { transform: scale(0.95); }

  .color-picker { display: flex; justify-content: center; gap: 0.4rem; margin: 0.75rem 0; flex-wrap: wrap; }
  .color-dot {
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: transform 0.1s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: var(--white); transform: scale(1.15); }

  /* Verse Trace */
  .trace-canvas-wrap { background: var(--white); border-radius: 8px; padding: 0.5rem; margin: 0.75rem 0; position: relative; }
  canvas { display: block; width: 100%; border-radius: 6px; touch-action: none; }
  .trace-tools { display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.5rem; }
  .trace-btn { background: var(--yellow); color: var(--navy); border: none; padding: 0.5rem 1rem;
    font-weight: 900; font-size: 0.8rem; border-radius: 8px; cursor: pointer; }
  .trace-btn.erase { background: var(--rose); }

  .pen-colors { display: flex; justify-content: center; gap: 0.3rem; margin: 0.5rem 0; }
  .pen-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; }
  .pen-dot.selected { border-color: var(--white); }

  /* Prayer Draw */
  .prayer-canvas-wrap { background: var(--white); border-radius: 8px; padding: 0.5rem; margin: 0.75rem 0; }

  footer { margin-top: 2rem; text-align: center; font-size: 0.85rem;
    border-top: 1px solid rgba(255,217,61,0.3); padding-top: 1rem; }
  footer a { color: var(--sky); text-decoration: none; font-weight: 700; }

  @media print {
    body { background: white; color: black; }
    .wrap { max-width: 100%; }
    header, footer, .color-picker, .trace-tools, .pen-colors, .toolbar { display: none; }
    .section { border: 2px solid #ccc; break-inside: avoid; }
    .pillar { border-color: #999; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">STAYTHEWAY KIDS</div>
    <h1>Activity Page!</h1>
    <div class="emoji">🎨✏️🐑</div>
  </header>

  <!-- Activity 1: Color the Pillars -->
  <div class="section">
    <h2>🏛️ Color the 7 Pillars!</h2>
    <p>Pick a color, then tap each pillar to color it in!</p>
    <div class="color-picker" id="color-picker"></div>
    <div class="pillars" id="pillars"></div>
  </div>

  <!-- Activity 2: Trace / Write the Verse -->
  <div class="section">
    <h2>✏️ Trace the Verse!</h2>
    <p>Use your finger or mouse to trace the key verse:</p>
    <div class="trace-canvas-wrap">
      <canvas id="trace-canvas" width="520" height="160"></canvas>
    </div>
    <div class="pen-colors" id="pen-colors"></div>
    <div class="trace-tools">
      <button class="trace-btn erase" onclick="clearCanvas('trace-canvas')">ERASE</button>
    </div>
  </div>

  <!-- Activity 3: Draw Your Prayer -->
  <div class="section">
    <h2>🙏 Draw Your Prayer!</h2>
    <p>Draw a picture of something you want to pray about today.</p>
    <div class="prayer-canvas-wrap">
      <canvas id="prayer-canvas" width="520" height="300"></canvas>
    </div>
    <div class="pen-colors" id="prayer-pen-colors"></div>
    <div class="trace-tools">
      <button class="trace-btn erase" onclick="clearCanvas('prayer-canvas')">ERASE</button>
    </div>
  </div>

  <footer>
    <div>StayTheWay Kids • <a href="https://staytheway.com">staytheway.com</a></div>
  </footer>
</div>

<script>
  // ===== Color the Pillars =====
  var PILLAR_DATA = [
    {icon: "👂", label: "Listen"},
    {icon: "🙌", label: "Honor"},
    {icon: "🏠", label: "Build"},
    {icon: "❤️", label: "Heart"},
    {icon: "🤫", label: "Quiet"},
    {icon: "⭐", label: "Good"},
    {icon: "➡️", label: "Forward"}
  ];
  var COLORS = ["#E0516C","#FF8C42","#FFD93D","#3AC47B","#1478F0","#B07CD8","#F4B6C9","#FFFFFF"];
  var selectedColor = COLORS[0];

  var pickerEl = document.getElementById("color-picker");
  COLORS.forEach(function(c) {
    var dot = document.createElement("div");
    dot.className = "color-dot" + (c === selectedColor ? " selected" : "");
    dot.style.background = c;
    dot.addEventListener("click", function() {
      selectedColor = c;
      document.querySelectorAll(".color-dot").forEach(function(d) { d.classList.remove("selected"); });
      dot.classList.add("selected");
    });
    pickerEl.appendChild(dot);
  });

  var pillarsEl = document.getElementById("pillars");
  PILLAR_DATA.forEach(function(p) {
    var div = document.createElement("div");
    div.className = "pillar";
    div.innerHTML = '<span class="p-icon">' + p.icon + '</span>' + p.label;
    div.addEventListener("click", function() {
      div.style.background = selectedColor;
      div.style.borderColor = selectedColor;
    });
    pillarsEl.appendChild(div);
  });

  // ===== Drawing Canvases =====
  var PEN_COLORS = ["#000000","#E0516C","#1478F0","#3AC47B","#FFD93D","#B07CD8","#FF8C42"];

  function setupCanvas(canvasId, penContainerId) {
    var canvas = document.getElementById(canvasId);
    var ctx = canvas.getContext("2d");
    var drawing = false;
    var penColor = "#000000";

    // Scale for retina
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = canvas.height; // keep the set height

    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // Pre-draw verse text if trace canvas
    if (canvasId === "trace-canvas") {
      ctx.fillStyle = "#E0E0E0";
      ctx.font = "italic 22px Georgia, serif";
      ctx.textAlign = "center";
      ctx.fillText('"My sheep hear My voice,', canvas.width / 2, 50);
      ctx.fillText('and I know them,', canvas.width / 2, 85);
      ctx.fillText('and they follow Me." — John 10:27', canvas.width / 2, 120);
    }

    function getPos(e) {
      var r = canvas.getBoundingClientRect();
      var touch = e.touches ? e.touches[0] : e;
      return {
        x: (touch.clientX - r.left) * (canvas.width / r.width),
        y: (touch.clientY - r.top) * (canvas.height / r.height)
      };
    }

    function start(e) {
      e.preventDefault();
      drawing = true;
      var p = getPos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }
    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      var p = getPos(e);
      ctx.strokeStyle = penColor;
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
    function end() { drawing = false; }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    canvas.addEventListener("mouseup", end);
    canvas.addEventListener("mouseleave", end);
    canvas.addEventListener("touchstart", start, {passive: false});
    canvas.addEventListener("touchmove", move, {passive: false});
    canvas.addEventListener("touchend", end);

    // Pen colors
    if (penContainerId) {
      var container = document.getElementById(penContainerId);
      PEN_COLORS.forEach(function(c) {
        var dot = document.createElement("div");
        dot.className = "pen-dot" + (c === penColor ? " selected" : "");
        dot.style.background = c;
        dot.addEventListener("click", function() {
          penColor = c;
          container.querySelectorAll(".pen-dot").forEach(function(d) { d.classList.remove("selected"); });
          dot.classList.add("selected");
        });
        container.appendChild(dot);
      });
    }
  }

  function clearCanvas(id) {
    var canvas = document.getElementById(id);
    var ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (id === "trace-canvas") {
      ctx.fillStyle = "#E0E0E0";
      ctx.font = "italic 22px Georgia, serif";
      ctx.textAlign = "center";
      ctx.fillText('"My sheep hear My voice,', canvas.width / 2, 50);
      ctx.fillText('and I know them,', canvas.width / 2, 85);
      ctx.fillText('and they follow Me." — John 10:27', canvas.width / 2, 120);
    }
  }

  setupCanvas("trace-canvas", "pen-colors");
  setupCanvas("prayer-canvas", "prayer-pen-colors");
</script>
</body>
</html>
